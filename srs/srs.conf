# SRS 5 Configuration
listen              1935;
max_connections     1000;
daemon              off;
pid                 /usr/local/srs/objs/srs.pid;
srs_log_tank        file;
srs_log_file        /usr/local/srs/objs/srs.log;
srs_log_level       info;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             /usr/local/srs/objs/nginx/html;
}

stats {
    network         0;
    disk            /;
}

vhost defaultVhost {
    # HTTP-FLV for low-latency playback
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # HLS for compatibility
    hls {
        enabled     off;
    }

    # DVR - record to local filesystem
    dvr {
        enabled         off;
        dvr_path        /recordings/[app]/[stream]/[2006][01][02]_[15][04][05].mp4;
        dvr_plan        session;
        dvr_duration    0;
        dvr_wait_keyframe on;
    }

    # Enable HTTP callbacks
    http_hooks {
        enabled         on;
        allow_when_error on;
        on_publish      http://backend:8081/api/hooks/on_publish;
        on_unpublish    http://backend:8081/api/hooks/on_unpublish;
    }

    # Forward/relay
    forward {
        enabled         off;
        destination     forward_dummy:1935;
    }
}
